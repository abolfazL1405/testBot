name: Test Bot (3 Hours)

on:
  workflow_dispatch:

jobs:
  test-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install python-dotenv requests
      
      - name: Run bot for 3 hours
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          echo "🚀 Starting bot test (3 hours)..."
          echo "⏰ Start time: $(date)"
          
          EXIT_CODE=0
          timeout 10800 python bot.py || EXIT_CODE=$?
          
          echo "⏰ End time: $(date)"
          echo "Exit code: $EXIT_CODE"
          
          if [ $EXIT_CODE -eq 124 ]; then
            echo "✅ Bot ran for 3 hours successfully"
            exit 0
          elif [ $EXIT_CODE -eq 0 ]; then
            echo "✅ Bot completed successfully"
            exit 0
          else
            echo "❌ Bot exited with code $EXIT_CODE"
            exit $EXIT_CODE
          fi
      
      - name: Show final stats
        if: always()
        run: |
          if [ -f "telegram_data/collector.db" ]; then
            echo "📊 Final Statistics:"
            python bot.py stats
          else
            echo "⚠️ No database found"
          fi
      
      - name: Upload data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-data-${{ github.run_number }}
          path: |
            telegram_data/
          retention-days: 7
          if-no-files-found: warn
