name: Test Bot (3 Hours)

on:
  workflow_dispatch:  # اجرا دستی از طریق دکمه "Run workflow"

jobs:
  test-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3 ساعت
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create .env file
        run: |
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" > .env
          echo "DATA_DIR=telegram_data" >> .env
          echo "DB_FILE=collector.db" >> .env
          echo "LOG_LEVEL=INFO" >> .env
      
      - name: Run bot for 3 hours
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          echo "🚀 Starting bot test (3 hours)..."
          echo "⏰ Start time: $(date)"
          echo "🤖 Bot will run until: $(date -d '+3 hours')"
          
          # Run bot with timeout
          timeout 10800 python bot.py poll || EXIT_CODE=$?
          
          echo "⏰ End time: $(date)"
          
          # Exit code 124 means timeout (expected)
          if [ $EXIT_CODE -eq 124 ]; then
            echo "✅ Bot ran for 3 hours successfully"
            exit 0
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Bot exited with code $EXIT_CODE"
            exit $EXIT_CODE
          fi
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs
          path: |
            logs/
            telegram_data/
          retention-days: 7
      
      - name: Show statistics
        if: always()
        run: |
          if [ -f "telegram_data/collector.db" ]; then
            echo "📊 Final Statistics:"
            sqlite3 telegram_data/collector.db "SELECT 'Total Updates: ' || COUNT(*) FROM updates;"
            sqlite3 telegram_data/collector.db "SELECT 'Total Users: ' || COUNT(*) FROM users;"
            sqlite3 telegram_data/collector.db "SELECT 'Total Chats: ' || COUNT(*) FROM chats;"
          else
            echo "⚠️ No database found"
          fi
