name: Test Bot (3 Hours)

on:
  workflow_dispatch:

jobs:
  test-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install python-dotenv requests
      
      - name: Run bot for 3 hours
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          echo "🚀 Starting simple bot test (3 hours)..."
          echo "⏰ Start time: $(date)"
          echo "🤖 Bot will run until: $(date -d '+3 hours')"
          
          timeout 10800 python bot.py || EXIT_CODE=$?
          
          echo "⏰ End time: $(date)"
          
          if [ $EXIT_CODE -eq 124 ]; then
            echo "✅ Bot ran for 3 hours successfully"
            exit 0
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Bot exited with code $EXIT_CODE"
            exit $EXIT_CODE
          fi
